    Short  (14x28): x=35,  bottom=92, top=64   → translate(35, 64)
    Medium (15x41): x=54,  bottom=84, top=43   → translate(54, 43)
    Tall   (14x58): x=74,  bottom=74, top=16   → translate(74, 16)

    Top-right corners (for gold line):
      Short:  (35+14, 64) = (49, 64)
      Medium: (54+15, 43) = (69, 43)
      Tall:   (74+14, 16) = (88, 16)
  -->

